<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <radialGradient id="bgGlow" cx="50%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#30B26F" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#0A84FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="#050505"/>
  <rect width="512" height="512" rx="112" fill="url(#bgGlow)"/>

  <!-- MARKTHAL bovenaan -->
  <text x="256" y="170" font-family="system-ui,-apple-system,'Helvetica Neue',sans-serif"
        font-size="48" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="6">MARKTHAL</text>

  <!-- ─── HQ gevormd uit neon-strepen ──────────────────────────────────
       Layout: H links (3 buizen: 2 verticaal + 1 horizontaal crossbar),
       Q rechts (cirkel-buis + diagonale tail). Drie kleuren:
         H-verticaal-L  = BB blauw
         H-crossbar     = SL groen
         H-verticaal-R  = BB blauw (consistent)
         Q              = KL oranje
       Halo (soft blur) onder, crisp + highlight bovenop.  -->

  <!-- HALO -->
  <g filter="url(#soft)" opacity="0.75">
    <!-- H -->
    <rect x="116" y="240" width="28" height="180" rx="14" fill="#0A84FF"/>
    <rect x="116" y="316" width="138" height="28" rx="14" fill="#30B26F"/>
    <rect x="226" y="240" width="28" height="180" rx="14" fill="#0A84FF"/>
    <!-- Q ring -->
    <circle cx="372" cy="330" r="68" fill="none" stroke="#E07A1F" stroke-width="28"/>
    <!-- Q tail -->
    <line x1="408" y1="370" x2="448" y2="418" stroke="#E07A1F" stroke-width="28" stroke-linecap="round"/>
  </g>

  <!-- INNER GLOW + CRISP -->
  <g filter="url(#glow)" opacity="0.95">
    <rect x="116" y="240" width="28" height="180" rx="14" fill="#0A84FF"/>
    <rect x="116" y="316" width="138" height="28" rx="14" fill="#30B26F"/>
    <rect x="226" y="240" width="28" height="180" rx="14" fill="#0A84FF"/>
    <circle cx="372" cy="330" r="68" fill="none" stroke="#E07A1F" stroke-width="28"/>
    <line x1="408" y1="370" x2="448" y2="418" stroke="#E07A1F" stroke-width="28" stroke-linecap="round"/>
  </g>

  <!-- CRISP TOP LAYER -->
  <rect x="116" y="240" width="28" height="180" rx="14" fill="#0A84FF"/>
  <rect x="116" y="316" width="138" height="28" rx="14" fill="#30B26F"/>
  <rect x="226" y="240" width="28" height="180" rx="14" fill="#0A84FF"/>
  <circle cx="372" cy="330" r="68" fill="none" stroke="#E07A1F" stroke-width="28"/>
  <line x1="408" y1="370" x2="448" y2="418" stroke="#E07A1F" stroke-width="28" stroke-linecap="round"/>

  <!-- HIGHLIGHT-STRIPES voor "lit neon tube" effect -->
  <rect x="123" y="246" width="14" height="168" rx="7" fill="#FFFFFF" opacity="0.45"/>
  <rect x="233" y="246" width="14" height="168" rx="7" fill="#FFFFFF" opacity="0.45"/>
  <rect x="123" y="322" width="124" height="14" rx="7" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="372" cy="330" r="68" fill="none" stroke="#FFFFFF" stroke-width="9" opacity="0.42"/>
  <line x1="408" y1="370" x2="448" y2="418" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" opacity="0.42"/>
</svg>
