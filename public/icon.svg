<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <radialGradient id="bgGlow" cx="50%" cy="62%" r="55%">
      <stop offset="0%" stop-color="#30B26F" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#0A84FF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="#050505"/>
  <rect width="512" height="512" rx="112" fill="url(#bgGlow)"/>

  <!-- MARKTHAL HQ text -->
  <text x="256" y="180" font-family="system-ui,-apple-system,'Helvetica Neue',sans-serif"
        font-size="56" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">MARKTHAL</text>
  <text x="256" y="230" font-family="system-ui,-apple-system,'Helvetica Neue',sans-serif"
        font-size="30" font-weight="500" fill="#FFFFFF" text-anchor="middle" letter-spacing="18" opacity="0.65">HQ</text>

  <!-- neon-glow halo achter de bars -->
  <g filter="url(#soft)" opacity="0.7">
    <rect x="90" y="298" width="332" height="22" rx="11" fill="#0A84FF"/>
    <rect x="90" y="346" width="332" height="22" rx="11" fill="#30B26F"/>
    <rect x="90" y="394" width="332" height="22" rx="11" fill="#E07A1F"/>
  </g>

  <!-- crisp neon-bars met inner glow -->
  <g filter="url(#glow)" opacity="0.95">
    <rect x="90" y="298" width="332" height="22" rx="11" fill="#0A84FF"/>
    <rect x="90" y="346" width="332" height="22" rx="11" fill="#30B26F"/>
    <rect x="90" y="394" width="332" height="22" rx="11" fill="#E07A1F"/>
  </g>
  <rect x="90" y="298" width="332" height="22" rx="11" fill="#0A84FF"/>
  <rect x="90" y="346" width="332" height="22" rx="11" fill="#30B26F"/>
  <rect x="90" y="394" width="332" height="22" rx="11" fill="#E07A1F"/>

  <!-- highlight-stripes voor "lit neon tube" effect -->
  <rect x="100" y="302" width="312" height="4" rx="2" fill="#FFFFFF" opacity="0.55"/>
  <rect x="100" y="350" width="312" height="4" rx="2" fill="#FFFFFF" opacity="0.55"/>
  <rect x="100" y="398" width="312" height="4" rx="2" fill="#FFFFFF" opacity="0.55"/>
</svg>
